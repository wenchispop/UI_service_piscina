<nav class="navbar-premium">
  <div class="nav-wrapper">
    
    <div class="nav-brand" routerLink="/">
      <div class="logo-box">
        <img src="/logo-piscina.png" alt="AquaStore">
      </div>
      <span class="brand-text">Aqua<span class="highlight">Store</span></span>
    </div>

    <ul class="nav-links">
      <li><a routerLink="/" routerLinkActive="active-link">Inicio</a></li>
      
      <li class="dropdown">
        <button class="drop-btn">Servicios ▾</button>
        <div class="dropdown-content">
          <a routerLink="/agenda">📅 Agendar Mantención</a>
          <a class="disabled-item">📊 Tabla de Estados <span class="badge-soon">Pronto</span></a>
          <a class="disabled-item">🛠️ Nueva Mantención <span class="badge-soon">Pronto</span></a>
        </div>
      </li>

      <li><a routerLink="/tienda" routerLinkActive="active-link">Tienda</a></li>

      <li class="dropdown" *ngIf="isAdmin">
        <button class="drop-btn admin-btn">Administración ▾</button>
        <div class="dropdown-content">
          <a routerLink="/tienda">📦 Gestionar Insumos</a>
          <a routerLink="/clientes">👥 Lista de Clientes</a>
          <a class="disabled-item">💰 Registrar Venta <span class="badge-soon">Pronto</span></a>
        </div>
      </li>
    </ul>

    <div class="nav-actions">
      <div class="role-pill" (click)="toggleRole()" [class.admin-active]="isAdmin">
        <div class="status-dot"></div>
        <span>{{ isAdmin ? 'Admin' : 'Cliente' }}</span>
      </div>

      <div class="cart-anchor" routerLink="/checkout">
        <span class="cart-icon">🛒</span>
        <span class="cart-badge" *ngIf="((cartService.cartCount$ | async) ?? 0) > 0">
          {{ cartService.cartCount$ | async }}
        </span>
      </div>

      <div class="access-link" routerLink="/login">
        <i class="bi bi-person-circle"></i>
        <span class="access-text">Acceso</span>
      </div>
    </div>

  </div>
</nav>
