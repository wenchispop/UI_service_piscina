<nav class="navbar-premium">
  <div class="nav-wrapper">
    
    <div class="nav-brand" routerLink="/">
      <div class="logo-box">
        <img src="/logo-piscina.png" alt="AquaStore">
      </div>
      <span class="brand-text">Aqua<span class="highlight">Store</span></span>
    </div>

    <ul class="nav-links">
      <li><a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}">Inicio</a></li>
      
      <li class="dropdown">
        <button class="drop-btn">Servicios ▾</button>
        <div class="dropdown-content">
          <a routerLink="/agenda">📅 Agenda Mantención</a>
          <a routerLink="/clientes" *ngIf="isAdmin">👥 Lista de Clientes</a>
        </div>
      </li>

      <li><a routerLink="/tienda" routerLinkActive="active-link">Tienda</a></li>

      <li class="dropdown" *ngIf="isAdmin">
        <button class="drop-btn admin-btn">Admin ⚙️</button>
        <div class="dropdown-content">
          <a routerLink="/admin-productos">📦 Gestionar Inventario</a>
          <a href="#">📊 Reportes de Venta</a>
        </div>
      </li>
    </ul>

    <div class="nav-actions">
      
      <div class="role-pill" (click)="toggleRole()" [class.admin-active]="isAdmin">
        <div class="status-dot"></div>
        <span>{{ isAdmin ? 'Admin' : 'Cliente' }}</span>
      </div>

      <div class="cart-anchor" routerLink="/checkout">
        <span class="cart-icon">🛒</span>
        <span class="cart-badge" *ngIf="((cartService.cartCount$ | async) ?? 0) > 0">
          {{ cartService.cartCount$ | async }}
        </span>
      </div>

      <button class="btn-exit" (click)="logout()">Salir</button>

    </div>
  </div>
</nav>
